<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A₹Pay Payment Gateway</title>

<link rel="stylesheet" href="payment.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo-section">

            <img src="logo.png"
                 alt="A₹Pay Logo"
                 class="logo">

        </div>

        <ul>

            <li>
                <a href="dashboard.html">🏠 Dashboard</a>
            </li>

            <li>
                <a href="payment.html" class="active">
                    💳 Payment
                </a>
            </li>

            <li>
                <a href="transaction.html">
                    📜 Transactions
                </a>
            </li>

            <li>
                <a href="analytic.html">
                    📊 Analytics
                </a>
            </li>

            <li>
                <a href="settings.html">
                    ⚙️ Settings
                </a>
            </li>

            <li>
                <a href="#" onclick="logout()">
                    🚪 Logout
                </a>
            </li>

        </ul>

    </div>

    <!-- MAIN CONTENT -->

    <main class="main-content">

        <div class="header">

            <h1>💳 A₹Pay Payment</h1>

            <p>Secure Transaction System</p>

        </div>

        <div class="payment-card">

            <form id="paymentForm">

                <!-- CUSTOMER DETAILS -->

                <div class="form-section">

                    <h3>👤 Customer Details</h3>

                    <input
                        type="text"
                        id="customerName"
                        placeholder="Full Name"
                        required>

                    <input
                        type="text"
                        id="mobile"
                        placeholder="Mobile Number"
                        required>

                    <input
                        type="email"
                        id="email"
                        placeholder="Email Address"
                        required>

                </div>

                <!-- BANK DETAILS -->

                <div class="form-section">

                    <h3>🏦 Bank Details</h3>

                    <input
                        type="text"
                        id="bankName"
                        placeholder="Bank Name"
                        required>

                    <input
                        type="text"
                        id="accountNumber"
                        placeholder="Account Number"
                        required>

                    <input
                        type="text"
                        id="ifsc"
                        placeholder="IFSC Code"
                        required>

                </div>

                <!-- PAYMENT DETAILS -->

                <div class="form-section">

                    <h3>💰 Payment Details</h3>

                    <input
                        type="number"
                        id="amount"
                        placeholder="Amount (₹)"
                        required>

                    <select id="paymentMethod" required>
                      <option value="upi">UPI</option>
<option value="creditcard">Credit Card</option>
<option value="debitcard">Debit Card</option>
<option value="netbanking">Net Banking</option>

                    </select>

                    <!-- UPI -->

                    <div id="upiBox" class="card-box hidden">

                        <span class="box-close"
                              onclick="closeBox('upiBox')">
                            ×
                        </span>

                        <p>🔵 UPI Payment</p>

                        <input
                            type="text"
                            id="upiId"
                            placeholder="Enter UPI ID">

                    </div>

                    <!-- CARD -->

                    <div id="cardBox" class="card-box hidden">

                        <span class="box-close"
                              onclick="closeBox('cardBox')">
                            ×
                        </span>

                        <p>💳 Card Details</p>

                        <input
                            type="text"
                            id="cardNumber"
                            placeholder="Card Number">

                        <input
                            type="text"
                            id="expiryDate"
                            placeholder="MM/YY">

                        <input
                            type="password"
                            id="cvv"
                            placeholder="CVV">

                    </div>

                    <!-- NET BANKING -->

                    <div id="netbankingBox" class="card-box hidden">

                        <span class="box-close"
                              onclick="closeBox('netbankingBox')">
                            ×
                        </span>

                        <p>🏦 Net Banking</p>

                        <input
                            type="text"
                            id="netUser"
                            placeholder="User ID">

                        <input
                            type="password"
                            id="netPassword"
                            placeholder="Password">

                    </div>

                </div>

                <button type="submit">

                    Proceed Payment

                </button>

            </form>

        </div>

    </main>

</div>

<script>

/* PAYMENT METHOD */

document.getElementById("paymentMethod")
.addEventListener("change", function(){

    const method = this.value;

    document.getElementById("upiBox")
    .classList.add("hidden");

    document.getElementById("cardBox")
    .classList.add("hidden");

    document.getElementById("netbankingBox")
    .classList.add("hidden");

    if(method === "upi"){

        document.getElementById("upiBox")
        .classList.remove("hidden");

    }
    else if(
        method === "creditcard" ||
        method === "debitcard"
    ){

        document.getElementById("cardBox")
        .classList.remove("hidden");

    }
    else if(method === "netbanking"){

        document.getElementById("netbankingBox")
        .classList.remove("hidden");

    }

});

/* CLOSE BOX */

function closeBox(id){

    document.getElementById(id)
    .classList.add("hidden");

}

/* PAYMENT SUBMIT */

document
.getElementById("paymentForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const transaction = {

        transactionId:
        "TXN" + Date.now(),

        customerName:
        document.getElementById("customerName").value,

        mobile:
        document.getElementById("mobile").value,

        email:
        document.getElementById("email").value,

        bankName:
        document.getElementById("bankName").value,

        accountNumber:
        document.getElementById("accountNumber").value,

        ifsc:
        document.getElementById("ifsc").value,

        amount:
        Number(
            document.getElementById("amount").value
        ),

        method:
        document.getElementById("paymentMethod")
        .value.toUpperCase(),
        
      status: "Pending",
date: new Date().toISOString()

    };

    /* SAVE PAYMENT */

    localStorage.setItem(
        "paymentData",
        JSON.stringify(transaction)
    );

    /* SAVE TRANSACTION */

    let transactions =
    JSON.parse(
        localStorage.getItem("transactions")
    ) || [];

    transactions.unshift(transaction);

    localStorage.setItem(
        "transactions",
        JSON.stringify(transactions)
    );

    /* OTP FLOW */

    localStorage.setItem(
        "authFlow",
        "payment"
    );

    window.location.href =
    "verification.html";

});

/* LOGOUT */

function logout(){

    localStorage.removeItem(
        "isLoggedIn"
    );

    window.location.href =
    "index.html";

}

</script>

</body>
</html>
