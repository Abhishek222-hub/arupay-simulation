<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>A₹Pay Verification</title>

    <link rel="stylesheet" href="verification.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

    <div class="verify-container">

        <div class="verify-card">

            <img src="logo.png"
                 alt="A₹Pay Logo"
                 class="logo">

            <h2>Verify Your Account</h2>

            <p class="subtitle">
                Enter the 6-digit OTP sent to your registered email or mobile number.
            </p>

            <div class="otp-box">

                <input type="text" maxlength="1" class="otp" inputmode="numeric">
                <input type="text" maxlength="1" class="otp" inputmode="numeric">
                <input type="text" maxlength="1" class="otp" inputmode="numeric">
                <input type="text" maxlength="1" class="otp" inputmode="numeric">
                <input type="text" maxlength="1" class="otp" inputmode="numeric">
                <input type="text" maxlength="1" class="otp" inputmode="numeric">

            </div>

            <button id="verifyBtn">
                Verify OTP
            </button>

            <div class="resend">

                Didn't receive OTP?

                <a href="#" id="resendOtp">
                    Resend OTP
                </a>

            </div>

        </div>

    </div>

    <script>

        const otpInputs =
        document.querySelectorAll(".otp");

        /* Auto Move + Number Only */

        otpInputs.forEach((input, index) => {

            input.addEventListener("input", () => {

                input.value =
                input.value.replace(/[^0-9]/g, "");

                if (
                    input.value.length === 1 &&
                    index < otpInputs.length - 1
                ) {
                    otpInputs[index + 1].focus();
                }

            });

            /* Backspace Support */

            input.addEventListener("keydown", (e) => {

                if (
                    e.key === "Backspace" &&
                    input.value === "" &&
                    index > 0
                ) {
                    otpInputs[index - 1].focus();
                }

            });

        });

        /* Paste Full OTP Support */

        otpInputs[0].addEventListener("paste", (e) => {

            e.preventDefault();

            const pastedData =
            (e.clipboardData || window.clipboardData)
            .getData("text")
            .replace(/\D/g, "")
            .slice(0, 6);

            pastedData.split("").forEach((digit, index) => {

                if (otpInputs[index]) {
                    otpInputs[index].value = digit;
                }

            });

        });

        /* Verify OTP */

        document
        .getElementById("verifyBtn")
        .addEventListener("click", () => {

            let otp = "";

            otpInputs.forEach(input => {
                otp += input.value;
            });

            if (otp.length !== 6) {

                alert("Please enter a valid 6-digit OTP.");
                return;

            }

            localStorage.setItem(
                "otpVerified",
                "true"
            );

            const authFlow =
            localStorage.getItem("authFlow");

            if (authFlow === "signup") {

                window.location.href =
                "accountsuccess.html";

            }

            else if (authFlow === "login") {

                window.location.href =
                "dashboard.html";

            }

            else if (authFlow === "payment") {

                window.location.href =
                "processing.html";

            }

            else {

                alert(
                    "Session expired. Please start again."
                );

                window.location.href =
                "index.html";

            }

        });
        

        /* Resend OTP */

        document
        .getElementById("resendOtp")
        .addEventListener("click", (e) => {

            e.preventDefault();

            alert(
                "OTP has been resent successfully."
            );

        });

    </script>

</body>

</html>
